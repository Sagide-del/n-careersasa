version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careersasa-backend
    environment:
      PORT: 8080
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: http://localhost:8080
    container_name: careersasa-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
